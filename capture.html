<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GearOps" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="Gearops-trans2.png" />
  <title>Capture — GearOps</title>
  <link href="/lib/bootstrap.min.css" rel="stylesheet" />
  <link href="/lib/fa.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html { height: 100%; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; overflow: hidden; display: flex; flex-direction: column; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }

    .top-nav { background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(96,165,250,0.2); padding: 0 12px; display: flex; align-items: center; gap: 12px; }
    .top-nav h1 { font-size: 1.25rem; font-weight: 700; color: #60a5fa; margin: 0; }
    .nav-back { background: rgba(96,165,250,0.15); border: 1px solid rgba(96,165,250,0.3); color: #60a5fa; border-radius: 8px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .nav-back:hover { background: rgba(96,165,250,0.25); color: #60a5fa; }

    .page { padding: 16px 20px; margin: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }

    /* Split layout */
    .split-layout {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }
    #capture-panel   { grid-column: 1; grid-row: 1; overflow: visible; }
    .panel-equipment { grid-column: 2; grid-row: 1; }
    .split-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }
    .panel-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8397a8;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* YouTube panel */
    .yt-wrap {
      flex: 1;
      background: #000;
      border: 2px solid rgba(239,68,68,0.2);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }
    .yt-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .yt-blocked {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.97);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }
    .yt-blocked i { font-size: 2rem; color: #ef4444; }
    .yt-blocked p { color: #94a3b8; font-size: 0.85rem; margin: 0; }
    .yt-blocked a { color: #ef4444; font-weight: 600; text-decoration: none; }

    /* Equipment status panel */
    .eq-status-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
    .eq-status-item { display: flex; align-items: center; gap: 8px; background: rgba(15,23,42,0.5); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 7px 10px; font-size: 0.78rem; transition: border-color 0.3s, background 0.3s; }
    .eq-status-item.offline { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); animation: blink-offline 1.2s infinite; }
    .eq-status-item.offline.no-blink { animation: none; border-color: rgba(239,68,68,0.3); }
    .eq-status-item.offline.no-blink .eq-dot { animation: none; }
    @keyframes blink-offline { 0%,100% { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); } 50% { border-color: rgba(239,68,68,0.7); background: rgba(239,68,68,0.18); } }
    .eq-status-item .eq-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .eq-status-item .eq-dot.online  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.6); }
    .eq-status-item .eq-dot.offline { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.6); animation: blink-dot 1.2s infinite; }
    @keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .eq-status-item .eq-dot.unknown { background: #8397a8; }
    .eq-status-item .eq-name { color: #e2e8f0; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .eq-status-item.offline .eq-name { color: #f87171; }
    .eq-status-item .eq-ip { font-family: 'Courier New', monospace; font-size: 0.72rem; color: #8397a8; white-space: nowrap; }
    .eq-status-item { cursor: pointer; }
    .eq-expand { display: none; width: 100%; margin-top: 6px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.07); flex-direction: column; gap: 5px; }
    .eq-status-item.expanded .eq-expand { display: flex; }
    .eq-expand-row { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; color: #94a3b8; }
    .eq-expand-row i { width: 13px; color: #8397a8; font-size: 0.7rem; flex-shrink: 0; }
    .eq-expand-actions { display: flex; gap: 6px; margin-top: 4px; }
    .eq-expand-btn { flex: 1; border: none; border-radius: 6px; padding: 5px 8px; font-size: 0.73rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .eq-expand-btn.browse  { background: rgba(96,165,250,0.2);  color: #60a5fa; }
    .eq-expand-btn.browse:hover  { background: rgba(96,165,250,0.3); }
    .eq-expand-btn.popout  { background: rgba(167,139,250,0.2); color: #a78bfa; }
    .eq-expand-btn.popout:hover  { background: rgba(167,139,250,0.3); }
    .eq-chevron { margin-left: auto; font-size: 0.65rem; color: #8397a8; transition: transform 0.2s; flex-shrink: 0; }
    .eq-status-item.expanded .eq-chevron { transform: rotate(180deg); }

    /* Capture fullscreen */
    #capture-panel.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: #000;
      padding: 0;
      gap: 0;
      border-radius: 0;
    }
    #capture-panel.fullscreen .panel-label,
    #capture-panel.fullscreen #pinned-cards-wrap { display: none !important; }
    #capture-panel.fullscreen .preview-wrap { flex: 1; border-radius: 0; min-height: 0; }

    @media (max-width: 600px) {
      body { height: auto; overflow: auto; }
      .page { overflow: visible; }
      .split-layout { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; overflow: visible; }
      #capture-panel, .panel-equipment { grid-column: 1; grid-row: auto; }
      .split-panel { height: 60vw; min-height: 240px; }
      .panel-equipment { height: auto; min-height: 0; overflow: visible; }
      .eq-status-list { overflow-y: visible; flex: none; }
    }

    /* Controls */
    .controls-card { background: rgba(30,41,59,0.8); border: 1px solid rgba(96,165,250,0.15); border-radius: 10px; padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }

    /* Equipment card styles (mirrored from main page) */
    .eq-card { background: rgba(30,41,59,0.8); border: 1px solid rgba(96,165,250,0.15); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s, filter 0.3s; position: relative; }
    .eq-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .card-header-row { display: flex; align-items: flex-start; gap: 10px; }
    .card-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .cat-computing  .card-icon { background: rgba(96,165,250,0.15);  color: #60a5fa; }
    .cat-network    .card-icon { background: rgba(245,158,11,0.15);  color: #f59e0b; }
    .cat-cameras    .card-icon { background: rgba(52,211,153,0.15);  color: #34d399; }
    .cat-encoders   .card-icon { background: rgba(244,114,182,0.15); color: #f472b6; }
    .cat-atems      .card-icon { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .cat-hyperdecks .card-icon { background: rgba(251,146,60,0.15);  color: #fb923c; }
    .cat-routing    .card-icon { background: rgba(56,189,248,0.15);  color: #38bdf8; }
    .cat-software   .card-icon { background: rgba(74,222,128,0.15);  color: #4ade80; }
    .cat-h2r        .card-icon { background: rgba(232,121,249,0.15); color: #e879f9; }
    .eq-card.cat-computing  { background: rgba(96,165,250,0.08);  border-color: rgba(96,165,250,0.2); }
    .eq-card.cat-network    { background: rgba(245,158,11,0.08);  border-color: rgba(245,158,11,0.2); }
    .eq-card.cat-cameras    { background: rgba(52,211,153,0.08);  border-color: rgba(52,211,153,0.2); }
    .eq-card.cat-encoders   { background: rgba(244,114,182,0.08); border-color: rgba(244,114,182,0.2); }
    .eq-card.cat-atems      { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.2); }
    .eq-card.cat-hyperdecks { background: rgba(251,146,60,0.08);  border-color: rgba(251,146,60,0.2); }
    .eq-card.cat-routing    { background: rgba(56,189,248,0.08);  border-color: rgba(56,189,248,0.2); }
    .eq-card.cat-software   { background: rgba(74,222,128,0.08);  border-color: rgba(74,222,128,0.2); }
    .eq-card.cat-h2r        { background: rgba(232,121,249,0.08); border-color: rgba(232,121,249,0.2); }
    .eq-card.online  { background: rgba(20,83,45,0.35); border-color: rgba(34,197,94,0.45); box-shadow: 0 0 18px rgba(34,197,94,0.1), 0 4px 16px rgba(0,0,0,0.3); }
    .eq-card.offline { background: rgba(127,29,29,0.35); border-color: rgba(239,68,68,0.4); opacity: 0.85; }
    .card-title { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; line-height: 1.2; }
    .cat-badge { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto; flex-shrink: 0; }
    .cat-computing  .cat-badge { background: rgba(96,165,250,0.2);  color: #60a5fa; }
    .cat-network    .cat-badge { background: rgba(245,158,11,0.2);  color: #f59e0b; }
    .cat-cameras    .cat-badge { background: rgba(52,211,153,0.2);  color: #34d399; }
    .cat-encoders   .cat-badge { background: rgba(244,114,182,0.2); color: #f472b6; }
    .cat-atems      .cat-badge { background: rgba(167,139,250,0.2); color: #a78bfa; }
    .cat-hyperdecks .cat-badge { background: rgba(251,146,60,0.2);  color: #fb923c; }
    .cat-routing    .cat-badge { background: rgba(56,189,248,0.2);  color: #38bdf8; }
    .cat-software   .cat-badge { background: rgba(74,222,128,0.2);  color: #4ade80; }
    .cat-h2r        .cat-badge { background: rgba(232,121,249,0.2); color: #e879f9; }
    .card-ip { font-family: 'Courier New', monospace; font-size: 0.82rem; color: #fff; display: flex; align-items: center; gap: 6px; min-width: 0; overflow: hidden; }
    .card-ip .no-ip { color: #8397a8; font-style: italic; font-family: inherit; }
    .card-ip span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-meta { font-size: 0.76rem; color: #8397a8; display: flex; flex-direction: column; gap: 2px; }
    .card-meta span { display: flex; align-items: center; gap: 5px; }
    .card-notes { font-size: 0.75rem; color: #8397a8; font-style: italic; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; background: rgba(51,65,85,0.6); color: #8397a8; border: 1px solid rgba(255,255,255,0.08); transition: background 0.3s, color 0.3s; }
    .status-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-badge.online  { background: rgba(34,197,94,0.15);  color: #22c55e; border-color: rgba(34,197,94,0.3); }
    .status-badge.offline { background: rgba(255,32,32,0.15);  color: #ff4444; border-color: rgba(255,32,32,0.3); }
    .btn-companion-press { flex: 1; border: none; border-radius: 8px; padding: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; min-height: 36px; background: rgba(239,68,68,0.2); color: #f87171; transition: background 0.15s, transform 0.1s; }
    .btn-companion-press:hover { background: rgba(239,68,68,0.35); }
    .btn-companion-press:active { transform: scale(0.97); }
    .btn-companion-press.pressed { background: #ef4444; color: #fff; }
    .companion-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; border: 1px solid; width: fit-content; transition: all 0.3s; }
    .companion-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .companion-badge.streaming  { background: rgba(255,32,32,0.15);  color: #ff4444; border-color: rgba(255,32,32,0.3);  box-shadow: 0 0 8px rgba(255,32,32,0.3); animation: pulse-badge 2s infinite; }
    .companion-badge.connecting { background: rgba(251,191,36,0.15); color: #fbbf24; border-color: rgba(251,191,36,0.3); animation: pulse-badge 1s infinite; }
    .companion-badge.idle       { background: rgba(34,197,94,0.15);  color: #22c55e; border-color: rgba(34,197,94,0.3);  box-shadow: 0 0 8px rgba(34,197,94,0.2); }
    @keyframes pulse-badge { 0%,100% { box-shadow: 0 0 6px rgba(34,197,94,0.3); } 50% { box-shadow: 0 0 14px rgba(34,197,94,0.7); } }
    .companion-text { font-size: 0.78rem; color: #94a3b8; }
    .companion-text-label { color: #8397a8; font-size: 0.72rem; }
    .card-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-frame, .btn-tab, .btn-popout { flex: 1; border: none; border-radius: 8px; padding: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: opacity 0.15s, transform 0.1s; min-height: 36px; }
    .btn-frame  { background: rgba(96,165,250,0.2); color: #60a5fa; }
    .btn-frame:hover  { background: rgba(96,165,250,0.3); }
    .btn-tab    { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .btn-tab:hover    { background: rgba(100,116,139,0.3); }
    .btn-popout { flex: 0 0 36px; background: rgba(167,139,250,0.2); color: #a78bfa; }
    .btn-popout:hover { background: rgba(167,139,250,0.3); }
    .btn-launch { flex: 1; border: none; border-radius: 8px; padding: 8px; font-size: 0.78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; min-height: 36px; background: rgba(74,222,128,0.2); color: #4ade80; }
    .btn-launch:hover { background: rgba(74,222,128,0.3); }
    .btn-frame:disabled, .btn-tab:disabled, .btn-popout:disabled { opacity: 0.4; cursor: not-allowed; }
    .ctrl-group { display: flex; flex-direction: column; gap: 3px; min-width: 160px; flex: 1; }
    .ctrl-group label { font-size: 0.7rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .ctrl-group select {
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e2e8f0;
      padding: 5px 10px;
      font-size: 0.83rem;
      outline: none;
      cursor: pointer;
    }
    .ctrl-group select:focus { border-color: rgba(96,165,250,0.5); }
    .ctrl-group select option { background: #1e293b; }

    .btn-scan { background: rgba(96,165,250,0.15); border: 1px solid rgba(96,165,250,0.3); color: #60a5fa; border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-scan:hover { background: rgba(96,165,250,0.25); }
    .btn-scan:disabled { opacity: 0.5; cursor: wait; }

    .btn-start { background: #22c55e; border: none; color: #0f172a; border-radius: 6px; padding: 5px 16px; font-size: 0.83rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-start:hover { background: #4ade80; }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-stop { background: #ef4444; border: none; color: #fff; border-radius: 6px; padding: 5px 16px; font-size: 0.83rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; display: none; }
    .btn-stop:hover { background: #f87171; }

    /* Preview */
    .preview-wrap {
      background: #000;
      border: 2px solid rgba(96,165,250,0.15);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 16/9;
    }
    .preview-wrap.live { border-color: rgba(34,197,94,0.5); box-shadow: 0 0 20px rgba(34,197,94,0.1); }

    #preview-img { width: 100%; height: 100%; object-fit: contain; display: none; }

    .preview-placeholder { text-align: center; color: #8397a8; }
    .preview-placeholder i { font-size: 4rem; margin-bottom: 12px; }
    .preview-placeholder p { font-size: 0.9rem; }

    .live-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ef4444;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      display: none;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.5px;
    }
    .live-badge .dot { width: 7px; height: 7px; background: #fff; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .status-bar { margin-top: 12px; font-size: 0.8rem; color: #8397a8; min-height: 20px; }
    .status-bar.err { color: #f87171; }
    .status-bar.ok  { color: #4ade80; }

    /* FFmpeg note */
    .ffmpeg-note { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); border-radius: 10px; padding: 14px 18px; font-size: 0.82rem; color: #fbbf24; line-height: 1.7; margin-bottom: 20px; display: none; }
    .ffmpeg-note a { color: #fbbf24; }

    @media (max-width: 600px) {
      .controls-card { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <img src="control-room.svg" alt="" style="height:28px;width:auto;filter:invert(65%) sepia(80%) saturate(600%) hue-rotate(340deg) brightness(1.1);" />
  <h1>Control Room</h1>
  <div id="clock" style="font-family:'Courier New',monospace;font-size:2.4rem;font-weight:700;color:#fb923c;letter-spacing:0.08em;text-shadow:0 0 18px rgba(251,146,60,0.6),0 0 4px rgba(251,146,60,0.4);margin-left:auto;margin-right:16px;"></div>
  <a class="nav-back" id="nav-back-link" href="/"><i class="fa-solid fa-arrow-left"></i> Equipment</a>
</nav>

<div class="page">

  <div class="ffmpeg-note" id="ffmpeg-note">
    <strong><i class="fa-solid fa-triangle-exclamation"></i> FFmpeg not found.</strong>
    Download from <a href="https://www.gyan.dev/ffmpeg/builds/" target="_blank">gyan.dev/ffmpeg/builds</a>,
    extract and place at <code>C:\ffmpeg\bin\ffmpeg.exe</code>, then restart start.bat.
  </div>

  <!-- Controls bar -->
  <div class="controls-card">
    <div class="ctrl-group">
      <label>Capture Device</label>
      <select id="device-select">
        <option value="">— Scan for devices —</option>
      </select>
    </div>
    <button class="btn-scan" id="btn-scan" onclick="scanDevices()">
      <i class="fa-solid fa-rotate"></i> Scan
    </button>
    <button class="btn-start" id="btn-start" onclick="startStream()" disabled>
      <i class="fa-solid fa-circle-play"></i> Start Preview
    </button>
    <button class="btn-stop" id="btn-stop" onclick="stopStream()">
      <i class="fa-solid fa-circle-stop"></i> Stop
    </button>
    <div class="status-bar" id="status-bar" style="margin:0;flex:1;text-align:right;"></div>
  </div>

  <!-- Split layout -->
  <div class="split-layout">

    <!-- Left: Capture / Multiview -->
    <div class="split-panel" id="capture-panel">
      <div class="panel-label">
        <i class="fa-solid fa-camera" style="color:#22c55e;"></i> Multiview / Capture
        <span id="capture-stats" style="display:none;align-items:center;gap:10px;margin-left:10px;">
          <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:#4ade80;border-radius:8px;padding:2px 9px;font-size:0.72rem;font-weight:700;">
            <i class="fa-solid fa-film" style="font-size:0.65rem;"></i> <span id="stat-fps">—</span> fps
          </span>
          <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.25);color:#60a5fa;border-radius:8px;padding:2px 9px;font-size:0.72rem;font-weight:700;">
            <i class="fa-solid fa-layer-group" style="font-size:0.65rem;"></i> <span id="stat-frames">—</span> frames
          </span>
        </span>
      </div>
      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-placeholder" id="placeholder">
          <i class="fa-solid fa-camera-slash"></i>
          <p>Select a capture device and press Start Preview</p>
        </div>
        <canvas id="preview-canvas" style="width:100%;height:100%;display:none;"></canvas>
        <div class="live-badge" id="live-badge">
          <span class="dot"></span> LIVE
        </div>
        <button id="btn-fullscreen" onclick="toggleCaptureFullscreen()" title="Fullscreen" style="position:absolute;top:8px;right:8px;z-index:10;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);color:#e2e8f0;border-radius:6px;padding:4px 10px;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;gap:5px;">
          <i class="fa-solid fa-expand"></i> Fullscreen
        </button>
      </div>
      <div id="pinned-cards-wrap" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;overflow:visible;align-content:start;"></div>
    </div>

    <!-- Right: Equipment status -->
    <div class="split-panel panel-equipment">
      <div class="panel-label">
        <i class="fa-solid fa-circle-dot" style="color:#22c55e;"></i> Equipment Status
        <button id="btn-show-all" onclick="toggleShowAll()" style="margin-left:auto;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:6px;padding:3px 10px;font-size:0.7rem;cursor:pointer;white-space:nowrap;">Show All</button>
      </div>
      <div class="eq-status-list" id="eq-status-list">
        <div style="color:#8397a8;font-size:0.8rem;text-align:center;padding:20px;">Loading...</div>
      </div>
    </div>

  </div>

</div>

<script>
  const SERVER = window.location.origin; // works from any device on the network
  let streaming = false;

  const LOCAL_IP_RE = /^192\.168\.|^10\.|^172\.(1[6-9]|2\d|3[01])\./;

  function toYouTubeEmbed(url) {
    // youtu.be/ID, youtube.com/watch?v=ID, youtube.com/live/ID, youtube.com/shorts/ID
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|live\/|shorts\/|embed\/))([a-zA-Z0-9_-]{11})/);
    if (!m) return null;
    return `https://www.youtube.com/embed/${m[1]}?autoplay=1&mute=1&rel=0&modestbranding=1`;
  }

  function resolveFrameSrc(rawUrl) {
    const yt = toYouTubeEmbed(rawUrl);
    if (yt) return yt;
    // Route local IPs through proxy so X-Frame-Options headers are stripped
    if (LOCAL_IP_RE.test(rawUrl.replace(/^https?:\/\//i, ''))) {
      return SERVER + '/proxy?url=' + encodeURIComponent(rawUrl);
    }
    return rawUrl;
  }

  // Restore saved browser URL
  const savedBrowserUrl = localStorage.getItem('swp-browser-url');
  if (savedBrowserUrl) {
    document.getElementById('browser-url').value = savedBrowserUrl;
    document.getElementById('browser-frame').src = resolveFrameSrc(savedBrowserUrl);
  }

  function navigate() {
    let url = document.getElementById('browser-url').value.trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) {
      url = (LOCAL_IP_RE.test(url) ? 'http://' : 'https://') + url;
    }
    document.getElementById('browser-url').value = url;
    document.getElementById('browser-frame').src = resolveFrameSrc(url);
    localStorage.setItem('swp-browser-url', url);
  }

  async function scanDevices() { // returns promise
    const btn = document.getElementById('btn-scan');
    const sel = document.getElementById('device-select');
    btn.disabled = true;
    setStatus('Scanning for capture devices...');

    try {
      const r = await fetch(SERVER + '/ffmpeg/devices');
      const data = await r.json();

      if (data.error) {
        if (data.error.includes('not found')) {
          document.getElementById('ffmpeg-note').style.display = 'block';
          setStatus('FFmpeg not installed.', 'err');
        } else {
          setStatus(data.error, 'err');
        }
        return;
      }

      document.getElementById('ffmpeg-note').style.display = 'none';
      sel.innerHTML = '<option value="">— Select a device —</option>';
      if (!data.devices.length) {
        setStatus('No capture devices found.', 'err');
        return;
      }
      const saved = localStorage.getItem('swp-capture-device');
      data.devices.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        sel.appendChild(opt);
      });
      if (saved && data.devices.includes(saved)) sel.value = saved;
      document.getElementById('btn-start').disabled = !sel.value;
      setStatus(`Found ${data.devices.length} device${data.devices.length !== 1 ? 's' : ''}.`, 'ok');
      sel.onchange = () => {
        localStorage.setItem('swp-capture-device', sel.value);
        document.getElementById('btn-start').disabled = !sel.value;
      };
    } catch(e) {
      setStatus('Cannot reach server — is start.bat running?', 'err');
    } finally {
      btn.disabled = false;
    }
  }

  async function startStream() {
    const device = document.getElementById('device-select').value;
    if (!device) return;

    setStatus('Starting FFmpeg...');
    try {
      const r = await fetch(`${SERVER}/ffmpeg/start?device=${encodeURIComponent(device)}`);
      const data = await r.json();
      if (!data.started) { setStatus('Failed to start.', 'err'); return; }
    } catch(e) { setStatus('Cannot reach server.', 'err'); return; }

    streaming = true;
    frameCount = 0;
    fpsCounter = 0;
    fpsLastTime = Date.now();
    document.getElementById('capture-stats').style.display = 'inline-flex';
    const canvas = document.getElementById('preview-canvas');
    canvas.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('preview-wrap').classList.add('live');
    document.getElementById('live-badge').style.display = 'flex';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';
    document.getElementById('btn-scan').disabled = true;
    document.getElementById('device-select').disabled = true;
    setStatus(`Live from: ${device}`);

    // Give FFmpeg ~1s to write first frame then start drawing
    setTimeout(drawLoop, 1000);
  }

  let frameCount = 0, fpsCounter = 0, fpsLastTime = 0;

  function drawLoop() {
    if (!streaming) return;
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      frameCount++;
      fpsCounter++;
      const now = Date.now();
      if (now - fpsLastTime >= 1000) {
        document.getElementById('stat-fps').textContent = fpsCounter;
        document.getElementById('stat-frames').textContent = frameCount;
        fpsCounter = 0;
        fpsLastTime = now;
      }
      // Snap container to video's actual aspect ratio — no black bars
      if (img.naturalWidth && img.naturalHeight) {
        document.getElementById('preview-wrap').style.aspectRatio = `${img.naturalWidth}/${img.naturalHeight}`;
      }
      const cw = canvas.clientWidth;
      const ch = canvas.clientHeight;
      canvas.width = cw;
      canvas.height = ch;
      const srcRatio = img.naturalWidth / img.naturalHeight;
      const dstRatio = cw / ch;
      let dw, dh, dx, dy;
      if (srcRatio > dstRatio) {
        dw = cw; dh = cw / srcRatio;
        dx = 0; dy = (ch - dh) / 2;
      } else {
        dh = ch; dw = ch * srcRatio;
        dx = (cw - dw) / 2; dy = 0;
      }
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cw, ch);
      ctx.drawImage(img, dx, dy, dw, dh);
      URL.revokeObjectURL(img.src);
    };
    // Fetch as blob to avoid browser image caching issues
    fetch(`${SERVER}/ffmpeg/frame?_=${Date.now()}`)
      .then(r => r.status === 204 ? null : r.blob())
      .then(blob => { if (blob && streaming) img.src = URL.createObjectURL(blob); })
      .catch(() => {});
    if (streaming) setTimeout(drawLoop, 40); // ~25fps
  }

  async function stopStream() {
    streaming = false;
    document.getElementById('capture-stats').style.display = 'none';
    const canvas = document.getElementById('preview-canvas');
    canvas.style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
    document.getElementById('preview-wrap').classList.remove('live');
    document.getElementById('preview-wrap').style.aspectRatio = '16/9';
    document.getElementById('live-badge').style.display = 'none';
    document.getElementById('btn-start').style.display = 'flex';
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('btn-scan').disabled = false;
    document.getElementById('device-select').disabled = false;
    setStatus('Preview stopped.');
    try { await fetch(SERVER + '/ffmpeg/stop'); } catch(e) {}
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status-bar');
    el.textContent = msg;
    el.className = 'status-bar ' + type;
  }

  // ── Clock ────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Capture fullscreen ───────────────────────────────────────────────────
  function toggleCaptureFullscreen() {
    const panel = document.getElementById('capture-panel');
    const btn = document.getElementById('btn-fullscreen');
    const isFs = panel.classList.toggle('fullscreen');
    btn.innerHTML = isFs
      ? '<i class="fa-solid fa-compress"></i> Exit Fullscreen'
      : '<i class="fa-solid fa-expand"></i> Fullscreen';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const panel = document.getElementById('capture-panel');
      if (panel.classList.contains('fullscreen')) toggleCaptureFullscreen();
    }
  });

  // Auto-scan on load, then auto-start if a device was previously selected
  scanDevices().then(() => {
    const sel = document.getElementById('device-select');
    if (sel.value) startStream();
  });

  // ── Pinned device cards ───────────────────────────────────────────────────
  let wpCompanionState = {};

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  const CAT_DEFAULTS = {
    computing:  { label:'Computing',  color:'#60a5fa', icon:'fa-microchip' },
    network:    { label:'Network',    color:'#f59e0b', icon:'fa-network-wired' },
    cameras:    { label:'Cameras',    color:'#34d399', icon:'fa-video' },
    encoders:   { label:'Encoders',   color:'#f472b6', icon:'fa-broadcast-tower' },
    atems:      { label:'ATEMs',      color:'#a78bfa', icon:'fa-sliders' },
    hyperdecks: { label:'HyperDecks', color:'#fb923c', icon:'fa-hdd' },
    routing:    { label:'Routing',    color:'#38bdf8', icon:'fa-diagram-project' },
    software:   { label:'Software',   color:'#4ade80', icon:'fa-rocket' },
    h2r:        { label:'H2R',        color:'#e879f9', icon:'fa-layer-group' },
  };
  const CUSTOM_PALETTE = ['#fb7185','#facc15','#a3e635','#14b8a6','#6366f1','#f97316','#06b6d4','#c084fc'];
  function crCatColor(cat) {
    if (CAT_DEFAULTS[cat]) return CAT_DEFAULTS[cat].color;
    let h = 0; for (let i = 0; i < cat.length; i++) h = (h*31+cat.charCodeAt(i))&0xffff;
    return CUSTOM_PALETTE[h % CUSTOM_PALETTE.length];
  }
  function crCatLabel(cat) { return CAT_DEFAULTS[cat] ? CAT_DEFAULTS[cat].label : cat.charAt(0).toUpperCase()+cat.slice(1); }
  function hex2rgb(hex) { return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`; }

  function buildDeviceCard(d) {
    const hasIp = !!d.ip;
    const url = hasIp ? 'http://' + d.ip : '';
    const color = crCatColor(d.category);
    const rgb = hex2rgb(color);
    const onlineCls = crOnlineStatus[d.id] === true ? ' online' : crOnlineStatus[d.id] === false ? ' offline' : '';
    const companionHtml = (d.companionVars || []).map(v => {
      const raw = wpCompanionState[v.key] ?? '';
      const val = v.key === 'stream_bitrate' && raw !== '' ? formatBitrate(raw) : raw;
      if (v.display === 'badge') {
        const cls = (raw === 'Streaming' || raw === 'Recording' || raw === 'Record') ? 'streaming' : raw === 'Connecting' ? 'connecting' : 'idle';
        return `<span class="companion-badge ${cls}" id="cr-cbadge-${d.id}-${v.key}">${esc(val || v.label)}</span>`;
      }
      return `<div class="companion-text" id="cr-cbadge-${d.id}-${v.key}" ${val ? '' : 'style="display:none"'}><span class="companion-text-label">${esc(v.label)}:</span> <span class="companion-text-val">${esc(val)}</span></div>`;
    }).join('');
    return `
      <div class="eq-card cat-${d.category}${onlineCls}" id="cr-card-${d.id}">
        <div class="card-header-row">
          <div class="card-icon"><i class="fa-solid ${d.icon||'fa-server'}"></i></div>
          <div style="flex:1;min-width:0;"><div class="card-title">${esc(d.name)}</div></div>
          <span class="cat-badge" style="background:rgba(${rgb},0.2);color:${color};">${crCatLabel(d.category)}</span>
        </div>
        <div class="card-ip" style="justify-content:space-between;">
          ${d.monitor && hasIp ? `<span class="status-badge ${crOnlineStatus[d.id] === true ? 'online' : crOnlineStatus[d.id] === false ? 'offline' : ''}" id="cr-status-${d.id}">${crOnlineStatus[d.id] === true ? 'Online' : crOnlineStatus[d.id] === false ? 'Offline' : 'Checking...'}</span>` : ''}
          <span>${hasIp ? esc(d.ip) : (d.appKey||d.appPath) ? '<span class="no-ip">Local application</span>' : '<span class="no-ip">No IP assigned</span>'}</span>
        </div>
        ${(d.user || d.pass) ? `<div class="card-meta">
          ${d.user ? `<span><i class="fa-solid fa-user" style="width:12px;"></i>${esc(d.user)}</span>` : ''}
          ${d.pass ? `<span><i class="fa-solid fa-key" style="width:12px;"></i>${esc(d.pass)}</span>` : ''}
        </div>` : ''}
        ${d.notes ? `<div class="card-notes">${esc(d.notes)}</div>` : ''}
        ${(d.companionButtons||[]).length ? `
        <div class="card-actions" style="flex-wrap:wrap;">
          ${(d.companionButtons||[]).map(b => `
          <button class="btn-companion-press" onclick="pressCRCompanionButton(${b.page},${b.row},${b.col},this)" title="Companion ${b.page}/${b.row}/${b.col}">
            <i class="fa-solid fa-circle-dot"></i> ${esc(b.label)}
          </button>`).join('')}
        </div>` : ''}
        ${companionHtml}
        ${(d.appKey || d.appPath || d.browserEnabled) ? `
        <div class="card-actions">
          ${(d.appKey || d.appPath) ? `
          <button class="btn-launch" onclick="launchPinnedApp('${d.id}')"><i class="fa-solid fa-rocket"></i> Launch</button>` : `
          <button class="btn-frame" onclick="window.open('${url}','_blank')" ${!hasIp ? 'disabled' : ''}><i class="fa-solid fa-arrow-up-right-from-square"></i> Browse</button>
          <button class="btn-popout" onclick="window.open('${url}','_blank','width=1280,height=720')" ${!hasIp ? 'disabled' : ''} title="Open in app window"><i class="fa-solid fa-window-restore"></i></button>`}
        </div>` : ''}
      </div>`;
  }

  function renderPinnedCards() {
    const wrap = document.getElementById('pinned-cards-wrap');
    const pinned = allEquipment.filter(d => d.showInControlRoom);
    wrap.innerHTML = pinned.map(d => buildDeviceCard(d)).join('');
  }

  function launchPinnedApp(id) {
    const d = allEquipment.find(e => e.id === id);
    if (!d) return;
    const url = d.appPath
      ? `${SERVER}/launch-path?path=${encodeURIComponent(d.appPath)}`
      : `${SERVER}/launch?app=${encodeURIComponent(d.appKey)}`;
    fetch(url).catch(() => alert('Server not reachable. Is start.bat running?'));
  }

  function updateCrCardStatus(id, online) {
    const card = document.getElementById('cr-card-' + id);
    if (card) { card.classList.toggle('online', online); card.classList.toggle('offline', !online); }
    const badge = document.getElementById('cr-status-' + id);
    if (badge) { badge.className = 'status-badge ' + (online ? 'online' : 'offline'); badge.textContent = online ? 'Online' : 'Offline'; }
  }

  function pressCRCompanionButton(page, row, col, btnEl) {
    if (btnEl) { btnEl.classList.add('pressed'); btnEl.disabled = true; }
    fetch(`${SERVER}/companion/press?page=${page}&row=${row}&col=${col}`)
      .then(r => r.json())
      .catch(e => console.warn('Companion press error:', e))
      .finally(() => { setTimeout(() => { if (btnEl) { btnEl.classList.remove('pressed'); btnEl.disabled = false; } }, 400); });
  }

  function updateCompanionEl(el, v, raw) {
    if (!el) return;
    const val = v.key === 'stream_bitrate' && raw !== '' ? formatBitrate(raw) : raw;
    if (v.display === 'badge') {
      el.className = 'companion-badge ' + ((raw === 'Streaming' || raw === 'Recording' || raw === 'Record') ? 'streaming' : raw === 'Connecting' ? 'connecting' : 'idle');
      el.textContent = val || v.label;
    } else {
      const valEl = el.querySelector('.companion-text-val');
      if (valEl) valEl.textContent = val;
      el.style.display = val ? '' : 'none';
    }
  }

  function updatePinnedBadges() {
    allEquipment.forEach(d => {
      (d.companionVars || []).forEach(v => {
        const raw = wpCompanionState[v.key] ?? '';
        // Update pinned card badges (cr-cbadge-)
        updateCompanionEl(document.getElementById(`cr-cbadge-${d.id}-${v.key}`), v, raw);
        // Update status list badges (eq-cbadge-)
        updateCompanionEl(document.getElementById(`eq-cbadge-${d.id}-${v.key}`), v, raw);
      });
    });
  }

  function pollWpCompanion() {
    fetch(SERVER + '/companion')
      .then(r => r.json())
      .then(data => { wpCompanionState = data; updatePinnedBadges(); renderEqStatus(); })
      .catch(() => {});
  }

  let allEquipment = [];
  const eqOnlineStatus = {};
  const crOnlineStatus = eqOnlineStatus; // alias — same object, used by buildDeviceCard

  function formatBitrate(raw) {
    if (!raw && raw !== 0) return null;
    const bps = parseFloat(raw);
    if (isNaN(bps)) return String(raw);
    return (bps / 1000000).toFixed(2) + ' MB';
  }

  const seenDevices = new Set();
  let showAllDevices = false;

  function toggleShowAll() {
    showAllDevices = !showAllDevices;
    const btn = document.getElementById('btn-show-all');
    btn.textContent = showAllDevices ? 'Online Only' : 'Show All';
    btn.style.color = showAllDevices ? '#60a5fa' : '#94a3b8';
    btn.style.borderColor = showAllDevices ? 'rgba(96,165,250,0.4)' : 'rgba(255,255,255,0.15)';
    renderEqStatus();
  }

  function renderEqStatus() {
    const list = document.getElementById('eq-status-list');
    const expanded = new Set([...list.querySelectorAll('.eq-status-item.expanded')].map(el => el.dataset.id));
    const monitored = allEquipment.filter(d => d.ip && d.monitor && d.category !== 'h2r');
    const visible = (showAllDevices ? monitored : monitored.filter(d => seenDevices.has(d.id)))
      .sort((a, b) => {
        const rank = d => {
        const online = eqOnlineStatus[d.id] === true;
        const offline = eqOnlineStatus[d.id] === false;
        const seen = seenDevices.has(d.id);
        if (offline && seen) return 0;   // dropped offline — top, flashing
        if (online) return 1;            // online
        if (offline && !seen) return 2;  // never seen, just red
        return 3;                        // unchecked
      };
        return rank(a) - rank(b);
      });

    if (!visible.length) {
      list.innerHTML = '<div style="color:#8397a8;font-size:0.8rem;text-align:center;padding:20px;">No devices online</div>';
      return;
    }

    list.innerHTML = visible.map(d => {
      const isOnline = eqOnlineStatus[d.id] === true;
      const wasSeen  = seenDevices.has(d.id);
      // Blink only if it was online this session and just dropped offline
      const shouldBlink = !isOnline && wasSeen;
      const dotCls  = isOnline ? 'online' : 'offline';
      const itemCls = isOnline ? '' : ' offline' + (shouldBlink ? '' : ' no-blink');

      const companionInline = (d.companionVars || []).map(v => {
        const raw = wpCompanionState[v.key] ?? '';
        const val = v.key === 'stream_bitrate' && raw !== '' ? formatBitrate(raw) : raw;
        if (v.display === 'badge') {
          const cls = (raw === 'Streaming' || raw === 'Recording' || raw === 'Record') ? 'streaming' : raw === 'Connecting' ? 'connecting' : 'idle';
          return `<span class="companion-badge ${cls}" id="eq-cbadge-${d.id}-${v.key}" style="font-size:0.6rem;padding:2px 6px;">${esc(val || v.label)}</span>`;
        }
        return `<div class="companion-text" id="eq-cbadge-${d.id}-${v.key}" style="font-size:0.72rem;${val ? '' : 'display:none'}"><span class="companion-text-label">${esc(v.label)}:</span> <span class="companion-text-val">${esc(val)}</span></div>`;
      }).join('');

      const url = d.ip ? 'http://' + d.ip : '';
      const expandRows = [
        d.ip    ? `<div class="eq-expand-row"><i class="fa-solid fa-network-wired"></i><span style="font-family:monospace;">${esc(d.ip)}</span></div>` : '',
        d.user  ? `<div class="eq-expand-row"><i class="fa-solid fa-user"></i>${esc(d.user)}</div>` : '',
        d.pass  ? `<div class="eq-expand-row"><i class="fa-solid fa-key"></i>${esc(d.pass)}</div>` : '',
        d.notes ? `<div class="eq-expand-row"><i class="fa-solid fa-note-sticky"></i>${esc(d.notes)}</div>` : '',
      ].filter(Boolean).join('');

      const expandActions = d.browserEnabled && url ? `
        <div class="eq-expand-actions">
          <button class="eq-expand-btn browse" onclick="event.stopPropagation();window.open('${url}','_blank')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Browse</button>
          <button class="eq-expand-btn popout" onclick="event.stopPropagation();fetch('${SERVER}/launch-browser?url='+encodeURIComponent('${url}')).catch(()=>window.open('${url}','_blank','width=1280,height=720'))" title="Open in app window"><i class="fa-solid fa-window-restore"></i> Popout</button>
        </div>` : '';

      return `<div class="eq-status-item${itemCls}" data-id="${d.id}" style="flex-wrap:wrap;gap:6px;" onclick="this.classList.toggle('expanded')">
        <span class="eq-dot ${dotCls}"></span>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;">
          <span class="eq-name">${esc(d.name)}</span>
          ${companionInline ? `<div style="display:flex;flex-wrap:wrap;gap:4px;">${companionInline}</div>` : ''}
        </div>
        <i class="fa-solid fa-chevron-down eq-chevron"></i>
        <div class="eq-expand">${expandRows}${expandActions}</div>
      </div>`;
    }).join('');

    expanded.forEach(id => {
      const el = list.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('expanded');
    });
  }

  function pingEqDevice(d) {
    if (!d.ip || !d.monitor || d.category === 'h2r') return;
    const ip = d.ip.split(':')[0].split('/')[0];
    console.log(`Pinging ${d.name} at ${ip}`);
    fetch(`${SERVER}/ping?ip=${encodeURIComponent(ip)}`)
      .then(r => r.json())
      .then(data => {
        if (data.online) seenDevices.add(d.id);
        eqOnlineStatus[d.id] = data.online;
        renderEqStatus();
        updateCrCardStatus(d.id, data.online);
      })
      .catch(() => { eqOnlineStatus[d.id] = false; renderEqStatus(); updateCrCardStatus(d.id, false); });
  }

  function pingAllEq() { allEquipment.forEach(pingEqDevice); }

  fetch('/devices')
    .then(r => r.json())
    .then(devices => {
      allEquipment = devices.sort((a, b) => a.name.localeCompare(b.name));
      renderPinnedCards();
      const hasPinnedCompanion = allEquipment.some(d => d.showInControlRoom && (d.companionVars || []).length);
      if (hasPinnedCompanion) {
        pollWpCompanion();
        setInterval(pollWpCompanion, +(localStorage.getItem('gearops_refresh_interval') || 10000));
      }
      renderEqStatus();
      pingAllEq();
      setInterval(pingAllEq, +(localStorage.getItem('gearops_refresh_interval') || 10000));
    })
    .catch(e => console.error('Failed to load devices:', e));
</script>
</body>
</html>
